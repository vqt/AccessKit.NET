name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      id-token: write   # required for Trusted Publishing (OIDC)
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: Pack
        run: dotnet pack src/AccessKit.NET/AccessKit.NET.csproj --configuration Release --output nupkg

      # Exchange the GitHub OIDC token for a short-lived nuget.org API key.
      - name: NuGet login (Trusted Publishing)
        uses: NuGet/login@v1
        id: login
        with:
          user: vqt

      - name: Push
        run: |
          $pkg = Get-ChildItem nupkg -Filter *.nupkg | Select-Object -First 1
          Write-Host "Pushing $($pkg.Name)"
          dotnet nuget push $pkg.FullName `
            --api-key ${{ steps.login.outputs.NUGET_API_KEY }} `
            --source https://api.nuget.org/v3/index.json `
            --skip-duplicate
