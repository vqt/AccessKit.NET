name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build src/AccessKit.NET/AccessKit.NET.csproj --configuration Release --no-restore

      - name: Pack (verbose)
        run: dotnet pack src/AccessKit.NET/AccessKit.NET.csproj --configuration Release --output nupkg --verbosity diagnostic

      - name: List all files
        run: Get-ChildItem -Path . -Recurse -Include "*.nupkg" -ErrorAction SilentlyContinue

      - name: Debug info
        run: |
          Write-Host "Current directory: $(Get-Location)"
          Write-Host "Contents of root:"
          Get-ChildItem -Path . | Format-Table
          Write-Host "Contents of nupkg (if exists):"
          if (Test-Path nupkg) { Get-ChildItem -Path nupkg -Recurse } else { Write-Host "nupkg directory does not exist" }

      - name: Get OIDC Token
        id: oidc
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('https://api.nuget.org');
            core.setSecret(token);
            core.setOutput('token', token);

      - name: Publish to NuGet (Trusted Publishing)
        run: dotnet nuget push ./nupkg/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ steps.oidc.outputs.token }} --skip-duplicate
